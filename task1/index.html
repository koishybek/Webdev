<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <h1 class="facebook-logo">facebook</h1>
            <p class="tagline">Facebook помогает вам всегда оставаться на связи и общаться со своими знакомыми.</p>
        </div>
        
        <div class="right-section">
            <form class="login-form">
                <input 
                    type="text" 
                    class="input-field" 
                    placeholder="Электронный адрес или номер телефона" 
                    required
                >
                <input 
                    type="password" 
                    class="input-field" 
                    placeholder="Пароль" 
                    required
                >
                <button type="submit" class="login-btn">Вход</button>
                <a href="#" class="forgot-password">Забыли пароль?</a>
                <div class="divider"></div>
                <button type="button" class="create-account-btn">Создать новый аккаунт</button>
            </form>
            <p class="footer-text">Создать Страницу знаменитости, музыкальной группы или компании.</p>
        </div>
    </div>
</body>
</html>
