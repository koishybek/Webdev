<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <h1 class="facebook-logo">facebook</h1>
            <p class="tagline">Facebook helps you connect and share with the people in your life.</p>
        </div>
        
        <div class="right-section">
            <form class="login-form">
                <input 
                    type="text" 
                    class="input-field" 
                    placeholder="Email address or phone number" 
                    required
                >
                <input 
                    type="password" 
                    class="input-field" 
                    placeholder="Password" 
                    required
                >
                <button type="submit" class="login-btn">Log In</button>
                <a href="#" class="forgot-password">Forgot password?</a>
                <hr class="divider">
                <button type="button" class="create-account-btn">Create new account</button>
            </form>
            <p class="footer-text">Create a Page for a celebrity, band or business.</p>
        </div>
    </div>
</body>
</html>
